<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="'Inter', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bbg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fef2f2"/>
      <stop offset="50%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#ecfdf5"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="500" fill="url(#bbg)"/>

  <text x="500" y="40" text-anchor="middle" fill="#1e1b4b" font-size="22" font-weight="700">Before vs After: School Operations Transformation</text>

  <!-- Before column -->
  <rect x="30" y="65" width="440" height="50" rx="12" fill="#ef4444" opacity="0.1"/>
  <text x="250" y="96" text-anchor="middle" fill="#dc2626" font-size="20" font-weight="700">Before (Manual)</text>

  <g fill="#7f1d1d" font-size="13">
    <rect x="50" y="130" width="400" height="38" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
    <text x="70" y="154">Staff sends fee reminders one by one</text>
    <text x="430" y="154" text-anchor="end" fill="#dc2626" font-weight="600">3 hrs/day</text>

    <rect x="50" y="180" width="400" height="38" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
    <text x="70" y="204">Manual attendance in registers</text>
    <text x="430" y="204" text-anchor="end" fill="#dc2626" font-weight="600">45 min/day</text>

    <rect x="50" y="230" width="400" height="38" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
    <text x="70" y="254">Excel report cards typed manually</text>
    <text x="430" y="254" text-anchor="end" fill="#dc2626" font-weight="600">2 weeks</text>

    <rect x="50" y="280" width="400" height="38" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
    <text x="70" y="304">Parent queries via chaotic WhatsApp groups</text>
    <text x="430" y="304" text-anchor="end" fill="#dc2626" font-weight="600">Unmanaged</text>

    <rect x="50" y="330" width="400" height="38" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
    <text x="70" y="354">Cash/cheque fee collection with manual ledger</text>
    <text x="430" y="354" text-anchor="end" fill="#dc2626" font-weight="600">Error-prone</text>

    <rect x="50" y="380" width="400" height="38" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
    <text x="70" y="404">Dropout discovered after student leaves</text>
    <text x="430" y="404" text-anchor="end" fill="#dc2626" font-weight="600">Too late</text>
  </g>

  <!-- Arrow -->
  <polygon points="485,260 515,245 515,275" fill="#7c3aed"/>

  <!-- After column -->
  <rect x="530" y="65" width="440" height="50" rx="12" fill="#10b981" opacity="0.1"/>
  <text x="750" y="96" text-anchor="middle" fill="#059669" font-size="20" font-weight="700">After (EdunodeX)</text>

  <g fill="#064e3b" font-size="13">
    <rect x="550" y="130" width="420" height="38" rx="8" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
    <text x="570" y="154">AI sends personalized WhatsApp reminders</text>
    <text x="950" y="154" text-anchor="end" fill="#059669" font-weight="600">Automated</text>

    <rect x="550" y="180" width="420" height="38" rx="8" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
    <text x="570" y="204">Face recognition marks attendance + alerts parents</text>
    <text x="950" y="204" text-anchor="end" fill="#059669" font-weight="600">Instant</text>

    <rect x="550" y="230" width="420" height="38" rx="8" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
    <text x="570" y="254">AI-generated report cards with remarks</text>
    <text x="950" y="254" text-anchor="end" fill="#059669" font-weight="600">2 clicks</text>

    <rect x="550" y="280" width="420" height="38" rx="8" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
    <text x="570" y="304">WhatsApp bot answers instantly in Hindi/English</text>
    <text x="950" y="304" text-anchor="end" fill="#059669" font-weight="600">24/7</text>

    <rect x="550" y="330" width="420" height="38" rx="8" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
    <text x="570" y="354">UPI + Razorpay with auto reconciliation</text>
    <text x="950" y="354" text-anchor="end" fill="#059669" font-weight="600">Zero errors</text>

    <rect x="550" y="380" width="420" height="38" rx="8" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
    <text x="570" y="404">AI scores dropout risk, flags before it happens</text>
    <text x="950" y="404" text-anchor="end" fill="#059669" font-weight="600">Predictive</text>
  </g>

  <!-- Bottom CTA -->
  <rect x="300" y="440" width="400" height="45" rx="10" fill="#7c3aed"/>
  <text x="500" y="468" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="600">Try EdunodeX Free for 14 Days — edunodex.in</text>
</svg>
