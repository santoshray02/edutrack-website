  <text x="438" y="259" text-anchor="end" fill="#dc2626" font-size="12" font-weight="700">2+ weeks</text>

  <rect x="550" y="232" width="410" height="44" rx="8" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="568" y="259" fill="#064e3b" font-size="12">AI generates report cards with remarks</text>
  <text x="948" y="259" text-anchor="end" fill="#059669" font-size="12" font-weight="700">2 clicks</text>

  <!-- Row 4: Parent queries -->
