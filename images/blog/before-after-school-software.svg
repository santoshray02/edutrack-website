<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="Inter, Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="bbg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fef2f2"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ecfdf5"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="520" fill="url(#bbg)"/>

  <text x="500" y="38" text-anchor="middle" fill="#1e1b4b" font-size="22" font-weight="700">A Day in Your School: Before vs After</text>

  <!-- Before column header -->
