  <text x="245" y="89" text-anchor="middle" fill="#dc2626" font-size="18" font-weight="700">Before (Paper + Excel + WhatsApp)</text>

  <!-- After column header -->
  <rect x="540" y="60" width="430" height="45" rx="10" fill="#10b981" opacity="0.12"/>
  <text x="755" y="89" text-anchor="middle" fill="#059669" font-size="18" font-weight="700">After (EdunodeX)</text>

  <!-- Arrow in center -->
  <polygon points="488,270 512,255 512,285" fill="#7c3aed"/>

  <!-- Row 1: Fee reminders -->
  <rect x="40" y="120" width="410" height="44" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="58" y="147" fill="#7f1d1d" font-size="12">Staff sends fee reminders one by one</text>
  <text x="438" y="147" text-anchor="end" fill="#dc2626" font-size="12" font-weight="700">3 hrs/day</text>

  <rect x="550" y="120" width="410" height="44" rx="8" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="568" y="147" fill="#064e3b" font-size="12">AI sends WhatsApp reminders automatically</text>
  <text x="948" y="147" text-anchor="end" fill="#059669" font-size="12" font-weight="700">0 effort</text>

  <!-- Row 2: Attendance -->
  <rect x="40" y="176" width="410" height="44" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="58" y="203" fill="#7f1d1d" font-size="12">Manual attendance in paper registers</text>
  <text x="438" y="203" text-anchor="end" fill="#dc2626" font-size="12" font-weight="700">45 min/day</text>

  <rect x="550" y="176" width="410" height="44" rx="8" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="568" y="203" fill="#064e3b" font-size="12">Face recognition + parent WhatsApp alert</text>
  <text x="948" y="203" text-anchor="end" fill="#059669" font-size="12" font-weight="700">Instant</text>

  <!-- Row 3: Report cards -->
