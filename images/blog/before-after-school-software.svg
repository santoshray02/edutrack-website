  <text x="438" y="315" text-anchor="end" fill="#dc2626" font-size="12" font-weight="700">Unmanaged</text>

  <rect x="550" y="288" width="410" height="44" rx="8" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="568" y="315" fill="#064e3b" font-size="12">WhatsApp bot answers in Hindi/English</text>
  <text x="948" y="315" text-anchor="end" fill="#059669" font-size="12" font-weight="700">24/7</text>

  <!-- Row 5: Fee collection -->
