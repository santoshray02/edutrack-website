  <text x="438" y="371" text-anchor="end" fill="#dc2626" font-size="12" font-weight="700">Error-prone</text>

  <rect x="550" y="344" width="410" height="44" rx="8" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="568" y="371" fill="#064e3b" font-size="12">UPI + Razorpay, auto reconciliation</text>
  <text x="948" y="371" text-anchor="end" fill="#059669" font-size="12" font-weight="700">Zero errors</text>

