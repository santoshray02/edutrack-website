  <text x="58" y="427" fill="#7f1d1d" font-size="12">Dropout discovered after student leaves</text>
  <text x="438" y="427" text-anchor="end" fill="#dc2626" font-size="12" font-weight="700">Too late</text>

  <rect x="550" y="400" width="410" height="44" rx="8" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1"/>
  <text x="568" y="427" fill="#064e3b" font-size="12">AI flags dropout risk before it happens</text>
  <text x="948" y="427" text-anchor="end" fill="#059669" font-size="12" font-weight="700">Predictive</text>

  <!-- Bottom CTA -->
  <rect x="300" y="462" width="400" height="42" rx="10" fill="#7c3aed"/>
  <text x="500" y="488" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="600">Try EdunodeX Free for 14 Days — edunodex.in</text>
