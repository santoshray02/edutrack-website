<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'Inter', 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#6d28d9"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="cardGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="shadow1">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#heroBg)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#ffffff" opacity="0.03"/>
  <circle cx="1100" cy="530" r="250" fill="#ffffff" opacity="0.03"/>
  <circle cx="800" cy="50" r="150" fill="#ffffff" opacity="0.02"/>

  <!-- Grid dots pattern -->
  <g fill="#ffffff" opacity="0.08">
    <circle cx="50" cy="300" r="2"/><circle cx="100" cy="300" r="2"/><circle cx="150" cy="300" r="2"/>
    <circle cx="50" cy="350" r="2"/><circle cx="100" cy="350" r="2"/><circle cx="150" cy="350" r="2"/>
    <circle cx="50" cy="400" r="2"/><circle cx="100" cy="400" r="2"/><circle cx="150" cy="400" r="2"/>
    <circle cx="1050" cy="200" r="2"/><circle cx="1100" cy="200" r="2"/><circle cx="1150" cy="200" r="2"/>
    <circle cx="1050" cy="250" r="2"/><circle cx="1100" cy="250" r="2"/><circle cx="1150" cy="250" r="2"/>
  </g>

  <!-- Main title -->
  <text x="600" y="180" text-anchor="middle" fill="#ffffff" font-size="52" font-weight="800" letter-spacing="-1">Why Your School Needs</text>
  <text x="600" y="245" text-anchor="middle" fill="#ffffff" font-size="52" font-weight="800" letter-spacing="-1">Smart Software in 2026</text>

  <!-- Subtitle -->
  <text x="600" y="300" text-anchor="middle" fill="#e0d4fc" font-size="22" font-weight="400">The complete guide for Indian school administrators</text>

  <!-- Stat cards row -->
  <!-- Card 1: Market Size -->
  <rect x="80" y="360" width="240" height="120" rx="16" fill="url(#cardGlow)" stroke="#ffffff30" stroke-width="1" filter="url(#shadow1)"/>
  <text x="200" y="405" text-anchor="middle" fill="#fbbf24" font-size="38" font-weight="800">$23.9B</text>
  <text x="200" y="430" text-anchor="middle" fill="#e0d4fc" font-size="13">Global School Software</text>
  <text x="200" y="450" text-anchor="middle" fill="#e0d4fc" font-size="13">Market in 2026</text>
  <text x="200" y="470" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">18.4% CAGR</text>

  <!-- Card 2: WhatsApp -->
  <rect x="350" y="360" width="240" height="120" rx="16" fill="url(#cardGlow)" stroke="#ffffff30" stroke-width="1" filter="url(#shadow1)"/>
  <text x="470" y="405" text-anchor="middle" fill="#34d399" font-size="38" font-weight="800">98%</text>
  <text x="470" y="430" text-anchor="middle" fill="#e0d4fc" font-size="13">WhatsApp Open Rate</text>
  <text x="470" y="450" text-anchor="middle" fill="#e0d4fc" font-size="13">vs 20% Email</text>
  <text x="470" y="470" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">600M+ Indian Users</text>

  <!-- Card 3: UPI -->
  <rect x="620" y="360" width="240" height="120" rx="16" fill="url(#cardGlow)" stroke="#ffffff30" stroke-width="1" filter="url(#shadow1)"/>
  <text x="740" y="405" text-anchor="middle" fill="#38bdf8" font-size="38" font-weight="800">228B+</text>
  <text x="740" y="430" text-anchor="middle" fill="#e0d4fc" font-size="13">UPI Transactions in 2025</text>
  <text x="740" y="450" text-anchor="middle" fill="#e0d4fc" font-size="13">Ministry Mandated for Schools</text>
  <text x="740" y="470" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">+33% YoY Growth</text>

  <!-- Card 4: AI -->
  <rect x="890" y="360" width="240" height="120" rx="16" fill="url(#cardGlow)" stroke="#ffffff30" stroke-width="1" filter="url(#shadow1)"/>
  <text x="1010" y="405" text-anchor="middle" fill="#c084fc" font-size="38" font-weight="800">38%</text>
  <text x="1010" y="430" text-anchor="middle" fill="#e0d4fc" font-size="13">Platforms Now Ship</text>
  <text x="1010" y="450" text-anchor="middle" fill="#e0d4fc" font-size="13">AI as Standard</text>
  <text x="1010" y="470" text-anchor="middle" fill="#86efac" font-size="11" font-weight="600">Up from ~0% in 2024</text>

  <!-- Bottom bar -->
  <rect x="0" y="510" width="1200" height="120" fill="#1e1b4b" opacity="0.4"/>
  <text x="600" y="560" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="600">EdunodeX — India's School OS | edunodex.in</text>
  <text x="600" y="590" text-anchor="middle" fill="#c4b5fd" font-size="14">AI Agents + WhatsApp + UPI + NEP 2020 Compliance | Starting at Rs.10/student/month</text>
</svg>
