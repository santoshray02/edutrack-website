<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Inter, Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="cardGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="shadow1">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#heroBg)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#ffffff" opacity="0.03"/>
  <circle cx="1100" cy="530" r="250" fill="#ffffff" opacity="0.03"/>
  <circle cx="800" cy="50" r="150" fill="#ffffff" opacity="0.02"/>

  <!-- Main title -->
  <text x="600" y="170" text-anchor="middle" fill="#ffffff" font-size="50" font-weight="800" letter-spacing="-1">Is Your School Still Running</text>
  <text x="600" y="232" text-anchor="middle" fill="#ffffff" font-size="50" font-weight="800" letter-spacing="-1">on Paper and WhatsApp?</text>

  <!-- Subtitle -->
  <text x="600" y="290" text-anchor="middle" fill="#e0d4fc" font-size="21" font-weight="400">Here is what it is costing you every single day</text>

  <!-- Pain stat cards -->
  <!-- Card 1: Fee reminders -->
  <rect x="60" y="330" width="255" height="130" rx="16" fill="url(#cardGlow)" filter="url(#shadow1)"/>
  <rect x="60" y="330" width="255" height="130" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>
  <text x="188" y="380" text-anchor="middle" fill="#f87171" font-size="40" font-weight="800">3 hrs/day</text>
  <text x="188" y="408" text-anchor="middle" fill="#e0d4fc" font-size="13">Wasted on manual</text>
  <text x="188" y="426" text-anchor="middle" fill="#e0d4fc" font-size="13">fee reminders</text>
  <text x="188" y="450" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">= 720 hours/year lost</text>

  <!-- Card 2: Attendance -->
  <rect x="340" y="330" width="255" height="130" rx="16" fill="url(#cardGlow)" filter="url(#shadow1)"/>
  <rect x="340" y="330" width="255" height="130" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>
  <text x="468" y="380" text-anchor="middle" fill="#f87171" font-size="40" font-weight="800">45 min/day</text>
  <text x="468" y="408" text-anchor="middle" fill="#e0d4fc" font-size="13">On manual attendance</text>
  <text x="468" y="426" text-anchor="middle" fill="#e0d4fc" font-size="13">registers per class</text>
  <text x="468" y="450" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">Parents never know on time</text>

  <!-- Card 3: Report cards -->
  <rect x="620" y="330" width="255" height="130" rx="16" fill="url(#cardGlow)" filter="url(#shadow1)"/>
  <rect x="620" y="330" width="255" height="130" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>
  <text x="748" y="380" text-anchor="middle" fill="#f87171" font-size="40" font-weight="800">2+ weeks</text>
  <text x="748" y="408" text-anchor="middle" fill="#e0d4fc" font-size="13">Teachers typing report</text>
  <text x="748" y="426" text-anchor="middle" fill="#e0d4fc" font-size="13">cards in Excel</text>
  <text x="748" y="450" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">Copy-paste remarks for 200 kids</text>

  <!-- Card 4: Dropouts -->
  <rect x="900" y="330" width="255" height="130" rx="16" fill="url(#cardGlow)" filter="url(#shadow1)"/>
  <rect x="900" y="330" width="255" height="130" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.2" stroke-width="1"/>
  <text x="1028" y="380" text-anchor="middle" fill="#f87171" font-size="40" font-weight="800">Too late</text>
  <text x="1028" y="408" text-anchor="middle" fill="#e0d4fc" font-size="13">Dropouts discovered</text>
  <text x="1028" y="426" text-anchor="middle" fill="#e0d4fc" font-size="13">after student leaves</text>
  <text x="1028" y="450" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">No early warning system</text>

  <!-- Bottom bar -->
  <rect x="0" y="510" width="1200" height="120" fill="#1e1b4b" opacity="0.5"/>
  <text x="600" y="555" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700">There is a better way.</text>
  <text x="600" y="585" text-anchor="middle" fill="#c4b5fd" font-size="14">EdunodeX replaces paper, Excel, and WhatsApp chaos with one AI-powered platform | edunodex.in</text>
</svg>
