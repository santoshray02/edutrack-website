<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580" font-family="Inter, Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="fbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf5ff"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="580" fill="url(#fbg)"/>

  <text x="500" y="42" text-anchor="middle" fill="#1e1b4b" font-size="22" font-weight="700">What Schools Actually Need in 2026</text>
  <text x="500" y="66" text-anchor="middle" fill="#6b7280" font-size="13">Ranked by how often school buyers ask for these features</text>

  <!-- Feature bars — labels left-aligned outside, descriptions inside bars -->
  <!-- 1. UPI Fee Collection -->
  <text x="280" y="110" text-anchor="end" fill="#1f2937" font-size="13" font-weight="600">UPI Fee Collection</text>
  <rect x="290" y="92" width="640" height="30" rx="6" fill="#7c3aed"/>
  <text x="300" y="112" fill="#ffffff" font-size="11">Govt mandate since Oct 2025</text>
  <text x="920" y="112" text-anchor="end" fill="#ffffff" font-size="11" font-weight="700">Required</text>

  <!-- 2. Parent Mobile App -->
  <text x="280" y="155" text-anchor="end" fill="#1f2937" font-size="13" font-weight="600">Parent Mobile App</text>
  <rect x="290" y="137" width="595" height="30" rx="6" fill="#8b5cf6"/>
  <text x="300" y="157" fill="#ffffff" font-size="11">Native iOS + Android, not mobile web</text>
  <text x="875" y="157" text-anchor="end" fill="#ffffff" font-size="11" font-weight="700">93%</text>

  <!-- 3. WhatsApp Automation -->
  <text x="280" y="200" text-anchor="end" fill="#1f2937" font-size="13" font-weight="600">WhatsApp Automation</text>
  <rect x="290" y="182" width="570" height="30" rx="6" fill="#a78bfa"/>
  <text x="300" y="202" fill="#ffffff" font-size="11">98% open rate vs 20% email</text>
  <text x="850" y="202" text-anchor="end" fill="#ffffff" font-size="11" font-weight="700">89%</text>

  <!-- 4. Biometric + GPS -->
  <text x="280" y="245" text-anchor="end" fill="#1f2937" font-size="13" font-weight="600">Biometric + GPS</text>
  <rect x="290" y="227" width="520" height="30" rx="6" fill="#6366f1"/>
  <text x="300" y="247" fill="#ffffff" font-size="11">Face attendance + bus tracking</text>
  <text x="800" y="247" text-anchor="end" fill="#ffffff" font-size="11" font-weight="700">81%</text>

  <!-- 5. AI Analytics -->
  <text x="280" y="290" text-anchor="end" fill="#1f2937" font-size="13" font-weight="600">AI-Powered Analytics</text>
  <rect x="290" y="272" width="485" height="30" rx="6" fill="#818cf8"/>
  <text x="300" y="292" fill="#ffffff" font-size="11">Dropout prediction, AI reports</text>
  <text x="765" y="292" text-anchor="end" fill="#ffffff" font-size="11" font-weight="700">76%</text>

  <!-- 6. NEP 2020 Report Cards -->
  <text x="280" y="335" text-anchor="end" fill="#1f2937" font-size="13" font-weight="600">NEP 2020 Reports</text>
  <rect x="290" y="317" width="460" height="30" rx="6" fill="#2563eb"/>
  <text x="300" y="337" fill="#ffffff" font-size="11">Competency-based assessment</text>
  <text x="740" y="337" text-anchor="end" fill="#ffffff" font-size="11" font-weight="700">72%</text>

  <!-- 7. Cloud-First -->
  <text x="280" y="380" text-anchor="end" fill="#1f2937" font-size="13" font-weight="600">Cloud-First</text>
  <rect x="290" y="362" width="435" height="30" rx="6" fill="#3b82f6"/>
  <text x="300" y="382" fill="#ffffff" font-size="11">Access from anywhere, zero servers</text>
  <text x="715" y="382" text-anchor="end" fill="#ffffff" font-size="11" font-weight="700">68%</text>

  <!-- 8. Multi-Lingual -->
  <text x="280" y="425" text-anchor="end" fill="#1f2937" font-size="13" font-weight="600">Multi-Lingual</text>
  <rect x="290" y="407" width="410" height="30" rx="6" fill="#60a5fa"/>
  <text x="300" y="427" fill="#ffffff" font-size="11">Hindi + regional languages</text>
  <text x="690" y="427" text-anchor="end" fill="#ffffff" font-size="11" font-weight="700">64%</text>

  <!-- EdunodeX callout -->
  <rect x="200" y="470" width="600" height="55" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="500" y="496" text-anchor="middle" fill="#065f46" font-size="15" font-weight="700">EdunodeX checks ALL 8 boxes</text>
  <text x="500" y="514" text-anchor="middle" fill="#047857" font-size="11">The only Indian platform with AI agents + WhatsApp + UPI + face recognition + NEP compliance</text>

  <!-- Source -->
  <text x="500" y="560" text-anchor="middle" fill="#9ca3af" font-size="10">Based on 2025-2026 school buyer surveys and industry reports</text>
</svg>
