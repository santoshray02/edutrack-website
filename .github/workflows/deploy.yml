name: Build Astro site

on:
  push:
    branches: [main]
    paths:
      - 'astro/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: astro-build
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: astro
        run: bun install --frozen-lockfile

      - name: Build Astro site
        working-directory: astro
        run: bun --bun run astro build

      - name: Sync built output to repo root
        run: |
          rsync -a --delete \
            --exclude='/astro/' \
            --exclude='/.github/' \
            --exclude='/.git/' \
            --exclude='/.gitignore' \
            --exclude='/.claude/' \
            --exclude='/.superpowers/' \
            --exclude='/docs/' \
            --exclude='/node_modules/' \
            --exclude='/*.md' \
            --exclude='/deploy.sh' \
            astro/dist/ ./

      - name: Commit and push built output
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo "No built output changes to commit."
          else
            git commit -m "build: deploy Astro output [skip ci]"
            git push
          fi
